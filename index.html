<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ECEDE9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Финансы">
<title>Финансы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== Design tokens — "Ledger" ===== */
  :root{
    --bg:#ECEDE9;          /* cool paper gray (not warm cream) */
    --surface:#FFFFFF;
    --surface-2:#F6F6F3;
    --ink:#17191C;
    --muted:#7E827C;
    --faint:#A8ACA4;
    --hairline:rgba(20,22,28,.10);
    --hairline-strong:rgba(20,22,28,.16);
    --accent:#14533A;      /* deep evergreen */
    --accent-soft:#E3EDE7;
    --pos:#1E7A52;          /* money in */
    --neg:#17191C;          /* money out = ink, not red */
    --danger:#B23B2E;       /* only for negative balance / destructive */
    --radius:16px;
    --radius-sm:11px;
    --maxw:540px;
    --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;
    --ui:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,system-ui,sans-serif;
    --sat:env(safe-area-inset-top);
    --sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--ui);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    font-size:16px;line-height:1.4;
    overscroll-behavior-y:none;
  }
  .num{font-family:var(--mono);font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit;font-size:16px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

  /* ===== Shell ===== */
  #app{max-width:var(--maxw);margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header.top{
    position:sticky;top:0;z-index:30;
    padding:calc(var(--sat) + 14px) 20px 12px;
    background:color-mix(in srgb,var(--bg) 86%,transparent);
    backdrop-filter:saturate(1.1) blur(10px);-webkit-backdrop-filter:saturate(1.1) blur(10px);
  }
  header.top .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  header.top h1{margin:2px 0 0;font-size:30px;font-weight:700;letter-spacing:-.02em}
  header.top .row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--hairline);background:var(--surface);
    display:grid;place-items:center;color:var(--ink);flex:0 0 auto}
  .icon-btn:active{background:var(--surface-2)}
  .icon-btn svg{width:19px;height:19px}

  main{flex:1;padding:8px 16px 120px}

  /* ===== Cards ===== */
  .card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:18px}
  .card + .card{margin-top:14px}
  .section-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:22px 4px 10px}

  /* ===== Balance / signature ===== */
  .balance-card{padding:22px 20px 18px;box-shadow:0 1px 2px rgba(20,22,28,.04),0 8px 24px -16px rgba(20,22,28,.18)}
  .balance-card .label{font-size:13px;color:var(--muted);font-weight:500}
  .balance-card .label button{border:0;background:none;color:var(--accent);font-weight:600;font-size:13px;padding:0 0 0 8px}
  .balance-big{font-size:42px;font-weight:600;margin:6px 0 2px;letter-spacing:-.03em}
  .balance-big .cur{font-size:24px;color:var(--muted);margin-left:6px}
  .balance-big.negative{color:var(--danger)}

  /* flow bar */
  .flow{margin-top:18px}
  .flow-bar{height:10px;border-radius:6px;background:var(--surface-2);display:flex;overflow:hidden;border:1px solid var(--hairline)}
  .flow-bar .in{background:var(--pos)}
  .flow-bar .out{background:var(--ink)}
  .flow-legend{display:flex;justify-content:space-between;margin-top:12px;gap:10px}
  .flow-legend .item{flex:1}
  .flow-legend .k{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);font-weight:500}
  .flow-legend .item.out{text-align:right}
  .flow-legend .item.out .k{justify-content:flex-end}
  .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .dot.in{background:var(--pos)} .dot.out{background:var(--ink)}
  .flow-legend .v{font-size:18px;font-weight:600;margin-top:3px}
  .v.pos{color:var(--pos)} .v.neg{color:var(--neg)}

  /* ===== Period chips ===== */
  .periods{display:flex;gap:8px;overflow-x:auto;padding:2px 0 2px;margin:0 -2px 4px;scrollbar-width:none}
  .periods::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--hairline);background:var(--surface);border-radius:100px;
    padding:8px 15px;font-size:14px;font-weight:500;color:var(--ink)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ===== Transaction rows ===== */
  .day-head{display:flex;justify-content:space-between;align-items:baseline;padding:18px 4px 8px}
  .day-head .d{font-size:14px;font-weight:600;color:var(--ink)}
  .day-head .s{font-size:13px;color:var(--muted)}
  .tx-list{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);overflow:hidden}
  .tx{display:flex;align-items:center;gap:13px;padding:13px 16px;border-top:1px solid var(--hairline);background:none;border-left:0;border-right:0;width:100%;text-align:left}
  .tx:first-child{border-top:0}
  .tx:active{background:var(--surface-2)}
  .tx .ic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;background:var(--surface-2);color:var(--muted)}
  .tx .ic svg{width:17px;height:17px}
  .tx .mid{flex:1;min-width:0}
  .tx .name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .meta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
  .tx .cat{display:inline-block;font-size:11px;color:var(--muted)}
  .tx .amt{font-size:15.5px;font-weight:600;flex:0 0 auto;text-align:right}
  .amt.pos{color:var(--pos)} .amt.neg{color:var(--neg)}
  .tx.internal .amt{color:var(--faint)}
  .badge-int{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);border:1px solid var(--hairline);border-radius:5px;padding:1px 5px}

  /* ===== Empty states ===== */
  .empty{text-align:center;padding:50px 24px;color:var(--muted)}
  .empty .big{font-size:17px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{margin:0 0 18px;font-size:14px;line-height:1.5}

  /* ===== Buttons ===== */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:12px;
    padding:13px 18px;font-size:15px;font-weight:600}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:active{background:#0f4530}
  .btn.ghost{background:var(--surface);border:1px solid var(--hairline);color:var(--ink)}
  .btn.block{width:100%}
  .btn.danger{color:var(--danger);background:var(--surface);border:1px solid var(--hairline)}
  .btn svg{width:18px;height:18px}

  /* ===== Analytics ===== */
  .donut-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .donut{flex:0 0 auto}
  .donut-center{font-size:13px;fill:var(--muted)}
  .legend{flex:1;min-width:180px;display:flex;flex-direction:column;gap:9px}
  .legend .lr{display:flex;align-items:center;gap:9px;font-size:14px}
  .legend .lr .nm{flex:1;color:var(--ink)}
  .legend .lr .pc{color:var(--muted);font-size:12.5px;width:38px;text-align:right}
  .legend .lr .vl{font-weight:600;font-size:13.5px}
  .bars{display:flex;align-items:flex-end;gap:10px;height:140px;padding-top:8px}
  .bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bars .pair{display:flex;align-items:flex-end;gap:3px;height:100%;width:100%;justify-content:center}
  .bars .b{width:11px;border-radius:3px 3px 0 0;min-height:2px}
  .bars .b.in{background:var(--pos)} .bars .b.out{background:var(--ink)}
  .bars .ml{font-size:11px;color:var(--muted)}
  .rank{display:flex;flex-direction:column}
  .rank .rr{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--hairline)}
  .rank .rr:first-child{border-top:0}
  .rank .rk{width:20px;color:var(--faint);font-size:13px;font-weight:600}
  .rank .nm{flex:1;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank .vl{font-weight:600;font-size:14px}

  /* ===== More / settings list ===== */
  .list{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);overflow:hidden}
  .li{display:flex;align-items:center;gap:13px;padding:15px 16px;border-top:1px solid var(--hairline);width:100%;background:none;border-left:0;border-right:0;text-align:left;color:var(--ink);font-size:15px}
  .li:first-child{border-top:0}
  .li:active{background:var(--surface-2)}
  .li .ic{width:30px;color:var(--muted);display:grid;place-items:center}
  .li .ic svg{width:19px;height:19px}
  .li .lbl{flex:1;font-weight:500}
  .li .sub{color:var(--muted);font-size:13px;font-weight:400}
  .li .chev{color:var(--faint)}
  .switch{position:relative;width:46px;height:28px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .switch .tr{position:absolute;inset:0;background:var(--hairline-strong);border-radius:100px;transition:.2s}
  .switch .tr:before{content:"";position:absolute;width:24px;height:24px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch input:checked + .tr{background:var(--accent)}
  .switch input:checked + .tr:before{transform:translateX(18px)}

  /* ===== Tab bar ===== */
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;background:color-mix(in srgb,var(--surface) 92%,transparent);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--hairline);
    padding-bottom:var(--sab)}
  nav.tabs .inner{max-width:var(--maxw);margin:0 auto;display:flex}
  nav.tabs button{flex:1;border:0;background:none;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint)}
  nav.tabs button.active{color:var(--accent)}
  nav.tabs svg{width:23px;height:23px}
  nav.tabs .t{font-size:10.5px;font-weight:600;letter-spacing:.01em}

  /* ===== Sheets / modals ===== */
  .scrim{position:fixed;inset:0;background:rgba(20,22,28,.4);z-index:50;opacity:0;transition:opacity .22s;pointer-events:none}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg);
    border-radius:22px 22px 0 0;max-width:var(--maxw);margin:0 auto;
    transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);
    max-height:92vh;display:flex;flex-direction:column;padding-bottom:var(--sab)}
  .sheet.open{transform:translateY(0)}
  .sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--hairline-strong);margin:10px auto 4px}
  .sheet .sh-head{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 10px}
  .sheet .sh-head h2{margin:0;font-size:19px;font-weight:700}
  .sheet .sh-head .x{border:0;background:var(--surface);width:32px;height:32px;border-radius:50%;color:var(--muted);font-size:18px;display:grid;place-items:center;border:1px solid var(--hairline)}
  .sheet .sh-body{overflow-y:auto;padding:4px 18px 20px;-webkit-overflow-scrolling:touch}

  /* form */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:7px}
  .field input,.field select{width:100%;padding:13px 14px;border:1px solid var(--hairline);border-radius:12px;background:var(--surface);color:var(--ink)}
  .field input:focus,.field select:focus{border-color:var(--accent);outline:none}
  .amount-input{font-family:var(--mono);font-size:26px;font-weight:600;text-align:center;letter-spacing:-.02em}
  .seg{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;gap:4px;border:1px solid var(--hairline)}
  .seg button{flex:1;border:0;background:none;padding:11px;border-radius:9px;font-weight:600;font-size:14px;color:var(--muted)}
  .seg button.on-out{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .seg button.on-in{background:var(--surface);color:var(--pos);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .row2{display:flex;gap:12px}
  .row2 .field{flex:1}

  /* import preview */
  .imp-summary{display:flex;gap:12px;margin-bottom:6px}
  .imp-summary .stat{flex:1;background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:13px 14px;text-align:center}
  .imp-summary .stat .n{font-size:24px;font-weight:600}
  .imp-summary .stat .l{font-size:11.5px;color:var(--muted);margin-top:2px}
  .imp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--hairline);font-size:13.5px}
  .imp-row:first-child{border-top:0}
  .imp-row.dup{opacity:.45}
  .imp-row .dt{font-family:var(--mono);font-size:12px;color:var(--muted);width:48px}
  .imp-row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .imp-row .am{font-weight:600}

  /* category editor */
  .cat-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--hairline);border-radius:100px;padding:7px 12px;font-size:13.5px;margin:0 6px 6px 0}
  .cat-chip .sw{width:10px;height:10px;border-radius:50%}
  .rule-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--hairline)}
  .rule-row:first-child{border-top:0}
  .rule-row .kw{font-family:var(--mono);font-size:13px;flex:0 0 auto;max-width:46%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rule-row .arr{color:var(--faint)}
  .rule-row .ct{flex:1;font-size:13.5px;color:var(--muted)}
  .rule-row .del{border:0;background:none;color:var(--faint);font-size:18px;padding:4px}

  .file-hidden{display:none}
  .toast{position:fixed;left:50%;bottom:calc(86px + var(--sab));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:100px;font-size:14px;font-weight:500;z-index:90;
    opacity:0;transition:.25s;pointer-events:none;max-width:88%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin:10px 4px 0}

  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="row">
      <div>
        <div class="eyebrow" id="eyebrow">Баланс</div>
        <h1 id="title">Главная</h1>
      </div>
      <div id="head-actions"></div>
    </div>
  </header>
  <main id="view"></main>
  <nav class="tabs"><div class="inner" id="tabbar"></div></nav>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sh-head"><h2 id="sheet-title"></h2><button class="x" id="sheet-close">✕</button></div>
  <div class="sh-body" id="sheet-body"></div>
</div>

<input type="file" id="pdf-file" class="file-hidden" accept="application/pdf">
<input type="file" id="json-file" class="file-hidden" accept="application/json,.json">
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   ФИНАНСЫ — персональный учёт. Один файл, без сборки. Данные локально (IndexedDB).
   Импорт выписки Kaspi Gold (PDF) разбирается на клиенте через pdf.js (CDN).
   ========================================================================= */

const ICONS = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V4"/><path d="M4 20h16"/><rect x="7.5" y="11" width="3" height="6" rx=".6"/><rect x="13.5" y="7" width="3" height="10" rx=".6"/></svg>',
  more:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>',
  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="m7 11 5 5 5-5"/><path d="M5 20h14"/></svg>',
  tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12V5a2 2 0 0 1 2-2h7l9 9-9 9z"/><circle cx="7.5" cy="7.5" r="1.3"/></svg>',
  rules:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h10M4 17h7"/><path d="m17 14 2 2 3-3"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 5 6v5c0 4 3 7 7 9 4-2 7-5 7-9V6z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',
  buy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h13l-1.2 9.5a2 2 0 0 1-2 1.7H9.2a2 2 0 0 1-2-1.7L6 4H3.5"/><circle cx="9.5" cy="20.5" r="1"/><circle cx="16" cy="20.5" r="1"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m4 12 16-7-6 16-3-7z"/></svg>',
  cash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.4"/></svg>',

/* ---------- IndexedDB ---------- */
const DB={db:null,ok:false};
function idbOpen(){return new Promise((res,rej)=>{
  if(!('indexedDB' in window)||!indexedDB){rej(new Error('no idb'));return;}
  let req;try{req=indexedDB.open('finance_db',1);}catch(e){rej(e);return;}
  req.onupgradeneeded=()=>{const db=req.result;
    if(!db.objectStoreNames.contains('tx'))db.createObjectStore('tx',{keyPath:'id'});
    if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv',{keyPath:'k'});};
  req.onsuccess=()=>res(req.result);
  req.onerror=()=>rej(req.error||new Error('idb error'));
});}
function idbAll(store){return new Promise((res,rej)=>{const t=DB.db.transaction(store,'readonly');const r=t.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function idbGet(store,k){return new Promise((res,rej)=>{const t=DB.db.transaction(store,'readonly');const r=t.objectStore(store).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbPut(store,val){return new Promise((res,rej)=>{const t=DB.db.transaction(store,'readwrite');t.objectStore(store).put(val);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function idbDel(store,k){return new Promise((res,rej)=>{const t=DB.db.transaction(store,'readwrite');t.objectStore(store).delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function idbBulkTx(arr){return new Promise((res,rej)=>{const t=DB.db.transaction('tx','readwrite');const s=t.objectStore('tx');arr.forEach(x=>s.put(x));t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function idbClearTx(){return new Promise((res,rej)=>{const t=DB.db.transaction('tx','readwrite');t.objectStore('tx').clear();t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}

/* =========================================================================
   ПАРСЕР ВЫПИСКИ KASPI GOLD (PDF)
   Логика:
   1. Из pdf.js берём текстовые элементы каждой страницы и собираем их обратно
      в визуальные строки по координате Y (важно: колонки Дата/Сумма/Операция/
      Детали лежат на одной строке, но как отдельные элементы).
   2. Выкидываем постраничные шапки/футеры и служебные примечания, иначе они
      попадут в «детали» соседней операции на стыке страниц.
   3. Отрезаем всё до заголовка таблицы «Дата Сумма Операция Детали»
      (выше — блок «Краткое содержание операций», его парсить нельзя).
   4. Глобальным regex выделяем записи: дата -> знак+сумма -> хвост
      (всё до следующей даты+знака). Многострочные детали склеиваются сами.
   ========================================================================= */
const KASPI_TYPES=['Поступление со своего счета','Перевод на свой счет','Зачисление кредита','Зачисления кредитов','Пополнение','Перевод','Покупка','Снятие','Разное'];
const FURNITURE=[
  /^\s*АО\s*«?Kaspi/i, /^\s*Приложение к Справке/i, /Сумма заблокирована/i,
  /^\s*Раздел\s*«?Краткое/i, /между счетами в Kaspi/i, /^\s*СПРАВКА\s*$/i,
  /остатке на счете/i, /Как проверить справку/i, /сервис проверки/i,
  /По курсу, установленному/i, /Информация действительна/i, /прилагается/i,
  /^\s*ВЫПИСКА\s*$/i, /Номер карты/i, /Номер счета/i, /Валюта счета/i,
  /Доступно на/i, /Краткое содержание/i, /Лимит на снятие/i,
];

function reconstructLines(items){
  // items: [{str, transform:[a,b,c,d,x,y]}]
  const rows=[];
  const tol=3;
  items.forEach(it=>{
    const str=(it.str||'');
    if(!str.trim())return;
    const x=it.transform[4], y=it.transform[5];
    let row=rows.find(r=>Math.abs(r.y-y)<=tol);
    if(!row){row={y,parts:[]};rows.push(row);}
    row.parts.push({x,str});
  });
  rows.sort((a,b)=>b.y-a.y); // top of page first
  return rows.map(r=>{
    r.parts.sort((a,b)=>a.x-b.x);
    return r.parts.map(p=>p.str).join(' ').replace(/\s+/g,' ').trim();
  });
}

function parseKaspi(allLines){
  // drop page furniture
  let lines=allLines.filter(l=>l && !FURNITURE.some(rx=>rx.test(l)));
  // anchor at table header
  let startIdx=lines.findIndex(l=>/Дата\s+Сумма\s+Операция\s+Детали/.test(l));
  if(startIdx>=0)lines=lines.slice(startIdx+1);
  let text=lines.join('\n');
  // safety: cut trailing notes if any slipped through
  const cut=text.search(/Сумма заблокирована|Раздел\s*«?Краткое/i);
  if(cut>=0)text=text.slice(0,cut);

  const out=[];
  const re=/(\d{2}\.\d{2}\.\d{2})\s+([+-])\s*([\d \u00A0\u202F]*\d)[.,](\d{2})\s*₸?\s*([\s\S]*?)(?=\d{2}\.\d{2}\.\d{2}\s+[+-]|$)/g;
  let m;
  while((m=re.exec(text))){
    const dmy=m[1].split('.'); // dd mm yy
    const iso='20'+dmy[2]+'-'+dmy[1]+'-'+dmy[0];
    const intPart=m[3].replace(/[^\d]/g,'');
    const amount=parseFloat(intPart+'.'+m[4]);
    if(!isFinite(amount)||amount===0)continue;
    const dir=m[2]==='+'?'in':'out';
    let tail=(m[5]||'').replace(/\s+/g,' ').trim();
    const cl=classifyKaspi(tail);
    out.push({date:iso,amount,direction:dir,type:cl.type,details:cl.details||cl.type});
  }
  return out;
}

// Determine operation type + clean details. Column wrapping in the PDF can scramble
// the order (e.g. "Поступление со Со своего Счета в Kaspi Pay своего счета"), so we
// detect by keywords rather than a strict prefix match.
function classifyKaspi(tail){
  let t=tail.replace(/^[^A-Za-zА-Яа-яЁё]+/,'').trim(); // drop any leading ₸ / punctuation / space
  if(/Поступлени[ея] со/i.test(t)||/со своего сч[её]та/i.test(t)){
    const d=t.replace(/Поступлени[ея] со/ig,'').replace(/своего сч[её]та/ig,'').replace(/\s+/g,' ').trim();
    return {type:'Поступление со своего счета',details:d};
  }
  if(/Перевод на свой/i.test(t)){
    const d=t.replace(/Перевод на свой/ig,'').replace(/(^|\s)сч[её]т(\s|$)/ig,' ').replace(/\s+/g,' ').trim();
    return {type:'Перевод на свой счет',details:d};
  }
  for(const ty of ['Пополнение','Перевод','Покупка','Снятие','Разное','Зачисление кредита']){
    if(t.startsWith(ty))return {type:ty,details:t.slice(ty.length).trim()};
  }
  return {type:'Операция',details:t};
}

function signatureBase(t){return [t.date,t.direction,Math.round(t.amount*100),t.type,(t.details||'').trim()].join('|');}

/* ---------- pdf.js lazy loader ---------- */
let pdfjsReady=null;
function ensurePdfjs(){
  if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);
  if(pdfjsReady)return pdfjsReady;
  pdfjsReady=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{try{window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res(window.pdfjsLib);}catch(e){rej(e);}};
    s.onerror=()=>rej(new Error('Не удалось загрузить pdf.js — нужен интернет для импорта.'));
    document.head.appendChild(s);
  });
  return pdfjsReady;
}

async function importPdfFile(file){
  let pdfjsLib;
  try{pdfjsLib=await ensurePdfjs();}
  catch(e){toast('Нет связи для загрузки PDF-движка');return;}
  toast('Читаю выписку…');
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let lines=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      lines=lines.concat(reconstructLines(tc.items));
    }
    const parsed=parseKaspi(lines);
    if(!parsed.length){toast('Не нашёл операций в файле');return;}
    // build candidates with dedup signatures
    const existing=new Set(state.txs.map(t=>t.sig).filter(Boolean));
    const occ={};
    const cands=parsed.map(t=>{
      const base=signatureBase(t);
      occ[base]=(occ[base]||0)+1;
      const sig=base+'#'+occ[base];
      return {...t, sig, isNew:!existing.has(sig)};
    });
    openImportPreview(cands);
  }catch(e){
    console.error(e);
    toast('Не удалось разобрать PDF');
  }
}

function defaultPeriod(){const d=new Date();return {type:'month',ym:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')};}
function periodLabel(p){
  if(!p)p=defaultPeriod();
  if(p.type==='all')return 'Всё время';
  if(p.type==='month'){const[y,m]=p.ym.split('-').map(Number);return RU_MONTHS[m-1][0].toUpperCase()+RU_MONTHS[m-1].slice(1)+(y!==new Date().getFullYear()?' '+y:'');}
  if(p.type==='range')return (p.from||'…')+' — '+(p.to||'…');
}
function inPeriod(t,p){
  if(!p)p=defaultPeriod();
  if(p.type==='all')return true;
  if(p.type==='month')return t.date.startsWith(p.ym);
  if(p.type==='range'){if(p.from&&t.date<p.from)return false;if(p.to&&t.date>p.to)return false;return true;}
  return true;
}
function effectiveTxs(){ // honour includeInternal toggle for stats
  const inc=state.settings.includeInternal;
  return state.txs.filter(t=>inc?true:!t.isInternal);
}
function totals(list){let i=0,o=0;list.forEach(t=>{if(t.direction==='in')i+=t.amount;else o+=t.amount;});return {in:i,out:o,net:i-o};}

  [['all','Все'],['in','Приход'],['out','Расход']].forEach(([val,lab])=>{const o=el('option');o.value=val;o.textContent=lab;if(opsFilter.dir===val)o.selected=true;dirSel.appendChild(o);});
  dirSel.onchange=e=>{opsFilter.dir=e.target.value;renderOpsList();};
  const catSel=el('select');catSel.style.cssText=dirSel.style.cssText;
  const oAll=el('option');oAll.value='all';oAll.textContent='Все категории';catSel.appendChild(oAll);
  state.categories.forEach(c=>{const o=el('option');o.value=c;o.textContent=c;if(opsFilter.cat===c)o.selected=true;catSel.appendChild(o);});
  catSel.onchange=e=>{opsFilter.cat=e.target.value;renderOpsList();};
  filt.appendChild(dirSel);filt.appendChild(catSel);
  sf.appendChild(filt);
  v.appendChild(sf);

  const holder=el('div');holder.id='ops-holder';v.appendChild(holder);
  renderOpsList();
}
function renderOpsList(){
  const holder=$('#ops-holder');if(!holder)return;holder.innerHTML='';
  const p=state.settings.period||defaultPeriod();
  let list=effectiveTxs().filter(t=>inPeriod(t,p));
  if(opsFilter.dir!=='all')list=list.filter(t=>t.direction===opsFilter.dir);
  if(opsFilter.cat!=='all')list=list.filter(t=>t.category===opsFilter.cat);
  if(opsFilter.q.trim()){const q=opsFilter.q.toLowerCase();list=list.filter(t=>((t.details||'')+' '+(t.note||'')+' '+(t.category||'')).toLowerCase().includes(q));}
  list.sort((a,b)=>b.date<a.date?-1:b.date>a.date?1:0);
  if(!list.length){holder.appendChild(emptyState());return;}
  // group by day
  const groups={};list.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t);});
  Object.keys(groups).sort().reverse().forEach(day=>{
    const items=groups[day];const dayNet=totals(items).net;
    const head=el('div','day-head');
    head.innerHTML='<div class="d">'+esc(fmtDayHead(day))+'</div><div class="s num">'+(dayNet>=0?'+ ':MINUS+' ')+fmtTenge(dayNet)+'</div>';
    holder.appendChild(head);
    holder.appendChild(txListEl(items.sort((a,b)=>(b.created||0)-(a.created||0))));
  });
}
function typeIcon(t){
  if(t.isInternal)return ICONS.swap;
  if(t.direction==='in')return ICONS.in;
  if(t.type==='Покупка')return ICONS.buy;
  if(t.type==='Снятие')return ICONS.cash;
  return ICONS.send;
}
function txListEl(items){
  const box=el('div','tx-list');
  items.forEach(t=>{
    const b=el('button','tx'+(t.isInternal?' internal':''));

/* ===================== ANALYTICS ===================== */
function renderAnalytics(v){
  setHead('Аналитика','Аналитика',[]);
  const p=state.settings.period||defaultPeriod();
  v.appendChild(periodChips(()=>render()));
  const list=effectiveTxs().filter(t=>inPeriod(t,p));
  const t=totals(list);

  // summary card
  const sum=el('div','card');
  sum.innerHTML='<div class="flow-legend" style="margin:0">'+
    '<div class="item in"><div class="k"><span class="dot in"></span>Приход</div><div class="v pos num">'+fmtTenge(t.in)+'</div></div>'+
    '<div class="item" style="text-align:center"><div class="k" style="justify-content:center">Поток</div><div class="v num" style="color:'+(t.net<0?'var(--danger)':'var(--ink)')+'">'+(t.net<0?MINUS+' ':'')+fmtTenge(t.net)+'</div></div>'+
    '<div class="item out"><div class="k"><span class="dot out"></span>Расход</div><div class="v neg num">'+fmtTenge(t.out)+'</div></div>'+
    '</div>';
  v.appendChild(sum);

  // expenses by category (donut)
  const exp=list.filter(t=>t.direction==='out');
  const byCat={};exp.forEach(t=>{const c=t.category||autoCategorize(t.details,t.type);byCat[c]=(byCat[c]||0)+t.amount;});
  const segs=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  v.appendChild(elSectionLabel('Расходы по категориям'));
  if(segs.length){
    const card=el('div','card');card.appendChild(donutBlock(segs,t.out));v.appendChild(card);
  }else{const e=el('div','card');e.innerHTML='<div class="empty"><p>Нет расходов за период.</p></div>';v.appendChild(e);}

  // top counterparties
  const byCp={};exp.forEach(t=>{const k=(t.details||'—').trim();byCp[k]=(byCp[k]||0)+t.amount;});
  const tops=Object.entries(byCp).sort((a,b)=>b[1]-a[1]).slice(0,7);
  if(tops.length){
    v.appendChild(elSectionLabel('Куда уходит больше всего'));
    const card=el('div','card');const rank=el('div','rank');
    tops.forEach(([nm,val],i)=>{const r=el('div','rr');
      r.innerHTML='<span class="rk num">'+(i+1)+'</span><span class="nm">'+esc(nm)+'</span><span class="vl num">'+fmtTenge(val)+'</span>';
      rank.appendChild(r);});
    card.appendChild(rank);v.appendChild(card);
  }

  // monthly trend (across all data, last 6 months present)
  const months={};effectiveTxs().forEach(t=>{const ym=t.date.slice(0,7);if(!months[ym])months[ym]={in:0,out:0};if(t.direction==='in')months[ym].in+=t.amount;else months[ym].out+=t.amount;});
  const mk=Object.keys(months).sort().slice(-6);
  if(mk.length>=2){
    v.appendChild(elSectionLabel('Приход и расход по месяцам'));
    const card=el('div','card');card.appendChild(barsBlock(mk,months));v.appendChild(card);
  }
}
function catColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return CAT_PALETTE[h%CAT_PALETTE.length];}
function donutBlock(segs,total){
  const r=54,c=2*Math.PI*r,cx=70,cy=70;
  let off=0;const circles=segs.map(([nm,val])=>{
    const frac=total?val/total:0;const len=frac*c;
    const col=catColor(nm);
    const s='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="17" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    off+=len;return s;
  }).join('');
  const wrap=el('div','donut-wrap');
  wrap.innerHTML=
    '<svg class="donut" width="140" height="140" viewBox="0 0 140 140">'+
      '<circle cx="70" cy="70" r="54" fill="none" stroke="var(--surface-2)" stroke-width="17"/>'+circles+
      '<text x="70" y="66" text-anchor="middle" class="donut-center" style="font-weight:600;fill:var(--ink);font-size:11px">Всего</text>'+
      '<text x="70" y="82" text-anchor="middle" class="num" style="font-size:13px;font-weight:600;fill:var(--ink)">'+fmtTenge(total).replace(' ₸','')+'</text>'+
    '</svg>'+
    '<div class="legend">'+segs.slice(0,7).map(([nm,val])=>{
      const pc=total?Math.round(val/total*100):0;
      return '<div class="lr"><span class="dot" style="background:'+catColor(nm)+'"></span><span class="nm">'+esc(nm)+'</span><span class="pc num">'+pc+'%</span><span class="vl num">'+fmtTenge(val)+'</span></div>';
    }).join('')+'</div>';
  return wrap;
}
function barsBlock(mk,months){
  const max=Math.max(...mk.map(m=>Math.max(months[m].in,months[m].out)),1);
  const wrap=el('div');
  let bars='<div class="bars">';
  mk.forEach(m=>{
    const ih=Math.round(months[m].in/max*100),oh=Math.round(months[m].out/max*100);
    bars+='<div class="col"><div class="pair"><div class="b in" style="height:'+ih+'%"></div><div class="b out" style="height:'+oh+'%"></div></div><div class="ml">'+monthLabel(m)+'</div></div>';
  });
  bars+='</div>';
  wrap.innerHTML=bars+'<div class="flow-legend" style="margin-top:14px"><div class="item in"><div class="k"><span class="dot in"></span>Приход</div></div><div class="item out"><div class="k"><span class="dot out"></span>Расход</div></div></div>';
  return wrap;
}

/* ----- add / edit transaction ----- */
function openTxSheet(tx){
  const editing=!!tx;
  const draft = tx ? {...tx} : {date:todayISO(),direction:'out',amount:0,details:'',category:'',note:'',type:'Расход',id:rid(),source:'manual',created:Date.now()};
  openSheet(editing?'Операция':'Новая операция',(body)=>{
    // direction segmented
    const seg=el('div','seg');
    const bo=el('button',draft.direction==='out'?'on-out':'','Расход');
    const bi=el('button',draft.direction==='in'?'on-in':'','Приход');
    bo.onclick=()=>{draft.direction='out';bo.className='on-out';bi.className='';};
    bi.onclick=()=>{draft.direction='in';bi.className='on-in';bo.className='';};
    seg.appendChild(bo);seg.appendChild(bi);
    const segWrap=el('div','field');segWrap.appendChild(seg);body.appendChild(segWrap);

    // amount
    const af=el('div','field');af.innerHTML='<label>Сумма, ₸</label>';
    const ai=el('input','amount-input num');ai.type='text';ai.inputMode='decimal';ai.value=draft.amount?String(Math.round(draft.amount)):'';ai.placeholder='0';
    ai.oninput=e=>{const cleaned=e.target.value.replace(/[^\d.,]/g,'').replace(',','.');draft.amount=parseFloat(cleaned)||0;};
    af.appendChild(ai);body.appendChild(af);

    // details
    const df=el('div','field');df.innerHTML='<label>Получатель / описание</label>';
    const di=el('input');di.type='text';di.value=draft.details||'';di.placeholder='напр. Royal Petrol';
    di.oninput=e=>{draft.details=e.target.value;};
    df.appendChild(di);body.appendChild(df);

    // date + category
    const row=el('div','row2');
    const dt=el('div','field');dt.innerHTML='<label>Дата</label>';
    const dti=el('input');dti.type='date';dti.value=draft.date;dti.onchange=e=>{draft.date=e.target.value;};dt.appendChild(dti);
    const cf=el('div','field');cf.innerHTML='<label>Категория</label>';
    const cs=el('select');
    const optAuto=el('option');optAuto.value='';optAuto.textContent='Авто';cs.appendChild(optAuto);
    state.categories.forEach(c=>{const o=el('option');o.value=c;o.textContent=c;if(draft.category===c)o.selected=true;cs.appendChild(o);});
    cs.onchange=e=>{draft.category=e.target.value;};cf.appendChild(cs);
    row.appendChild(dt);row.appendChild(cf);body.appendChild(row);

    // note
    const nf=el('div','field');nf.innerHTML='<label>Заметка</label>';
    const ni=el('input');ni.type='text';ni.value=draft.note||'';ni.oninput=e=>{draft.note=e.target.value;};nf.appendChild(ni);body.appendChild(nf);

    // save
    const save=el('button','btn primary block',editing?'Сохранить':'Добавить');
    save.onclick=()=>{
      if(!draft.amount||draft.amount<=0){toast('Введите сумму');return;}
      if(!draft.details.trim())draft.details=draft.direction==='in'?'Поступление':'Расход';
      draft.amount=Math.abs(draft.amount);
      draft.type=draft.direction==='in'?'Доход':'Расход';
      draft.isInternal=draft.category==='Внутренний перевод';
      if(!draft.category)draft.category=autoCategorize(draft.details,draft.type);
      if(!draft.sig)draft.sig='manual#'+draft.id;
      upsertTx(draft);closeSheet();toast(editing?'Сохранено':'Добавлено');render();
    };
    body.appendChild(save);

    if(editing){
      const del=el('button','btn danger block','Удалить операцию');del.style.marginTop='10px';
      del.onclick=()=>{deleteTx(draft.id);closeSheet();toast('Удалено');render();};
      body.appendChild(del);
    }
    setTimeout(()=>{if(!editing)ai.focus();},250);
  });
}

    redraw();body.appendChild(box);
    const row=el('div','row2');row.style.marginTop='14px';
    const kf=el('div','field');kf.innerHTML='<label>Слово</label>';const ki=el('input');ki.type='text';ki.placeholder='magnum';kf.appendChild(ki);
    const cf=el('div','field');cf.innerHTML='<label>Категория</label>';const cs=el('select');state.categories.forEach(c=>{const o=el('option');o.value=c;o.textContent=c;cs.appendChild(o);});cf.appendChild(cs);
    row.appendChild(kf);row.appendChild(cf);body.appendChild(row);
    const add=el('button','btn primary block','Добавить правило');
    add.onclick=()=>{const kw=ki.value.trim().toLowerCase();if(!kw)return;state.rules.push({id:rid(),kw,cat:cs.value});persistKV();ki.value='';redraw();};
    body.appendChild(add);
  });
}

/* =========================================================================
   MUTATIONS
   ========================================================================= */
function upsertTx(tx,skipRender){
  const idx=state.txs.findIndex(t=>t.id===tx.id);
  if(idx>=0)state.txs[idx]=tx;else state.txs.push(tx);
  persistTx(tx);
}
function deleteTx(id){state.txs=state.txs.filter(t=>t.id!==id);persistDelTx(id);}
function persistKVandRender(){persistKV();render();}

/* =========================================================================
   EXPORT / IMPORT
   ========================================================================= */
function download(filename,text,mime){
  const blob=new Blob([text],{type:mime||'text/plain'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
}
function exportJSON(){
  const data={app:'finance',version:1,exportedAt:new Date().toISOString(),
    txs:state.txs,categories:state.categories,rules:state.rules,settings:state.settings};
  download('finance-backup-'+todayISO()+'.json',JSON.stringify(data,null,2),'application/json');
  toast('Копия сохранена');
}
function exportCSV(){
  const rows=[['Дата','Тип','Направление','Сумма','Категория','Получатель','Заметка']];
  state.txs.slice().sort((a,b)=>a.date<b.date?-1:1).forEach(t=>{
    rows.push([t.date,t.type||'',t.direction==='in'?'приход':'расход',String(t.amount).replace('.',','),t.category||'',t.details||'',t.note||'']);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\r\n');
  download('finance-'+todayISO()+'.csv',csv,'text/csv');
  toast('CSV сохранён');
}
$('#json-file').addEventListener('change',async e=>{
  const file=e.target.files[0];e.target.value='';if(!file)return;
  try{
    const txt=await file.text();const data=JSON.parse(txt);
    if(!data||!Array.isArray(data.txs))throw new Error('bad');
    if(!confirm('Восстановить из копии? Текущие данные ('+state.txs.length+' операций) будут заменены.'))return;
    state.txs=data.txs;
    if(Array.isArray(data.categories))state.categories=data.categories;
    if(Array.isArray(data.rules))state.rules=data.rules;
    if(data.settings)state.settings={...state.settings,...data.settings};
    if(DB.ok){try{await idbClearTx();await idbBulkTx(state.txs);}catch(err){}}
    persistKV();toast('Восстановлено: '+state.txs.length);render();
  }catch(err){toast('Не похоже на файл копии');}
});
$('#pdf-file').addEventListener('change',e=>{const file=e.target.files[0];e.target.value='';if(file)importPdfFile(file);});

/* ---------- toast ---------- */
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* =========================================================================
   PWA: manifest + apple icon (generated at runtime) + best-effort SW
   ========================================================================= */
function makeIcon(size){
  const cv=document.createElement('canvas');cv.width=cv.height=size;const x=cv.getContext('2d');
  x.fillStyle='#14533A';x.fillRect(0,0,size,size);
  x.fillStyle='#ffffff';x.textAlign='center';x.textBaseline='middle';
  x.font='600 '+Math.round(size*0.56)+'px -apple-system,Segoe UI,Roboto,sans-serif';
  x.fillText('\u20B8',size/2,size*0.54);
  return cv.toDataURL('image/png');
}
function installPWA(){
  try{
    const icon180=makeIcon(180),icon512=makeIcon(512);
    const link=document.createElement('link');link.rel='apple-touch-icon';link.href=icon180;document.head.appendChild(link);
    const fav=document.createElement('link');fav.rel='icon';fav.href=icon180;document.head.appendChild(fav);
    const manifest={name:'Финансы',short_name:'Финансы',display:'standalone',orientation:'portrait',
      background_color:'#ECEDE9',theme_color:'#ECEDE9',start_url:'.',scope:'.',
      icons:[{src:icon512,sizes:'512x512',type:'image/png'},{src:icon180,sizes:'180x180',type:'image/png'}]};
    const mlink=document.createElement('link');mlink.rel='manifest';
    mlink.href='data:application/json,'+encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(mlink);
  }catch(e){}
}

/* =========================================================================
   INIT
   ========================================================================= */
async function init(){
  installPWA();
  try{DB.db=await idbOpen();DB.ok=true;}catch(e){DB.ok=false;}
  if(DB.ok){
    try{
      const txs=await idbAll('tx');
      const cats=await idbGet('kv','categories');
      const rules=await idbGet('kv','rules');
      const settings=await idbGet('kv','settings');
      if(txs&&txs.length)state.txs=txs;
      if(cats&&cats.v)state.categories=cats.v;
      if(rules&&rules.v)state.rules=rules.v;
      if(settings&&settings.v)state.settings={...state.settings,...settings.v};
      else await persistKV(); // first run: seed defaults
    }catch(e){}
  }
  if(!state.settings.period)state.settings.period=defaultPeriod();
  if(!state.settings.tab)state.settings.tab='home';
  render();
}
init();
</script>
